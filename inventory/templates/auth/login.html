{% extends 'core/base.html' %}
{% block title %}Login{% endblock %}
{% load static %}
{% block content %}
<style>
    .login-container {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f8f9fa;
    }

    .login-card {
        width: 100%;
        max-width: 350px; /* Reduced from 420px */
        border-radius: 16px;
        overflow: hidden;
        border: none;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .login-header {
        background-color: #fdf2f8;
        /* Light pink background */
        padding: 30px 20px; /* Reduced padding from 40px */
        text-align: center;
        border-bottom: 1px solid #fce7f3;
    }

    .login-logo {
        background: white;
        width: 80px; /* Reduced from 100px */
        height: 80px; /* Reduced from 100px */
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 15px;
        padding: 12px; /* Reduced from 15px */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .login-logo img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    .login-title {
        color: #1a237e;
        font-weight: 700;
        font-size: 1.25rem; /* Reduced from 1.5rem */
        margin-bottom: 0;
        line-height: 1.2;
    }

    .login-body {
        padding: 30px; /* Reduced from 40px */
        background: white;
    }

    .form-label {
        color: #1a237e;
        font-weight: 600;
        margin-bottom: 10px;
    }

    .input-group-custom {
        position: relative;
        margin-bottom: 25px;
    }

    .input-group-custom i.fa-key,
    .input-group-custom i.fa-user {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: #448aff;
        z-index: 10;
        font-size: 1.1rem;
    }

    .toggle-password-login {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: #9e9e9e;
        z-index: 10;
        cursor: pointer;
        font-size: 1.1rem;
        transition: color 0.3s;
    }

    .toggle-password-login:hover {
        color: #448aff;
    }

    .form-control-custom {
        padding: 12px 15px 12px 50px; /* Slightly reduced padding */
        border-radius: 50px;
        border: 1px solid #e0e0e0;
        background-color: #fcfdfe;
        font-size: 0.95rem; /* Slightly smaller font */
        transition: all 0.3s;
    }

    .form-control-custom:focus {
        border-color: #448aff;
        box-shadow: 0 0 0 4px rgba(68, 138, 255, 0.1);
        background-color: white;
        outline: none;
    }

    .login-btn {
        background-color: #0d6efd;
        color: white;
        border: none;
        padding: 12px; /* Reduced from 15px */
        border-radius: 50px;
        font-weight: 600;
        width: 100%;
        margin-top: 15px; /* Reduced from 20px */
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .login-btn:hover {
        background-color: #0b5ed7;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
    }

    .remember-me {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #616161;
        font-size: 0.95rem;
    }

    .remember-me input {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        cursor: pointer;
    }
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <img src="{% static 'img/logo.png' %}" alt="Potter's House Logo">
            </div>
            <h1 class="login-title">The Potter's House Management System</h1>
        </div>
        <div class="login-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label for="id_username" class="form-label">Username</label>
                    <div class="input-group-custom">
                        <i class="fas fa-user"></i>
                        <input type="text" name="username" class="form-control form-control-custom" id="id_username"
                            placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="input-group-custom">
                        <i class="fas fa-key"></i>
                        <input type="password" name="password" class="form-control form-control-custom" id="id_password"
                            placeholder="Enter your password" required>
                        <i class="fas fa-eye toggle-password-login" id="togglePassword"></i>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="remember_me">
                        <label for="rememberMe" class="mb-0">Remember me</label>
                    </div>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger mb-4 py-2 small">
                    <i class="fas fa-exclamation-circle me-2"></i>Invalid username or password.
                </div>
                {% endif %}

                <button type="submit" class="login-btn">
                    Login Now <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const togglePassword = document.querySelector("#togglePassword");
        const password = document.querySelector("#id_password");

        togglePassword.addEventListener("click", function () {
            // toggle the type attribute
            const type = password.getAttribute("type") === "password" ? "text" : "password";
            password.setAttribute("type", type);

            // toggle the icon
            this.classList.toggle("fa-eye");
            this.classList.toggle("fa-eye-slash");
        });
    });
</script>
{% endblock %}
